---
# ServiceMonitor for Prometheus to scrape API backend metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-backend
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - production
  selector:
    matchLabels:
      app: api-backend
  endpoints:
    - port: "3000"
      path: /metrics
      interval: 30s
---
# PrometheusRule for custom alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: suidex-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: suidex.rules
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5..",namespace="production"}[5m]))
            / sum(rate(http_requests_total{namespace="production"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate in production"
            description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="production"}[1h]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "{{ $labels.pod }} has restarted {{ $value }} times in the last hour"

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled",namespace="production"} == 1
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} OOMKilled"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOMKilled"

        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="production"}
            / container_spec_memory_limit_bytes{namespace="production"} > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage for {{ $labels.pod }}"
            description: "Memory usage is at {{ $value | humanizePercentage }}"

        - alert: PostgresConnectionsHigh
          expr: |
            pg_stat_activity_count{datname="suidex"} > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL connections approaching limit"

        - alert: PVCAlmostFull
          expr: |
            kubelet_volume_stats_used_bytes{namespace="production"}
            / kubelet_volume_stats_capacity_bytes{namespace="production"} > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
